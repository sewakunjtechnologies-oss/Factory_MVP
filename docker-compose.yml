services:
  factory-mvp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factory_mvp_server
    environment:
      APP_NAME: Factory Owner MVP
      API_V1_PREFIX: /api/v1
      DATABASE_URL: sqlite+aiosqlite:////app/data/factory.db
      REPORT_OUTPUT_DIR: /app/data/generated_reports
      UPLOAD_DIR: /app/data/uploads
      SECRET_KEY: ${SECRET_KEY:-change-this-local-server-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      ALGORITHM: HS256
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL:-gemini-2.5-flash-preview-native-audio-dialog}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://127.0.0.1:5173","http://localhost:5173","capacitor://localhost"]}'
      CORS_ORIGIN_REGEX: '${CORS_ORIGIN_REGEX:-}'
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-true}
      DISABLE_SCHEDULER: ${DISABLE_SCHEDULER:-false}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./backend/generated_reports:/app/data/generated_reports
      - ./backend/uploads:/app/data/uploads
    restart: unless-stopped
