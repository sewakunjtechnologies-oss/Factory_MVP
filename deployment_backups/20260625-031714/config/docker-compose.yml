services:
  factory-mvp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factory_mvp_server
    environment:
      APP_NAME: Factory Owner MVP
      API_V1_PREFIX: /api/v1
      DATABASE_URL: sqlite+aiosqlite:////app/data/factory.db
      SECRET_KEY: ${SECRET_KEY:-change-this-local-server-secret}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-10080}
      ALGORITHM: HS256
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_LIVE_MODEL: ${GEMINI_LIVE_MODEL:-gemini-2.5-flash-preview-native-audio-dialog}
      CORS_ORIGINS: '${CORS_ORIGINS:-["*"]}'
      CORS_ORIGIN_REGEX: '${CORS_ORIGIN_REGEX:-^https://.*\.trycloudflare\.com$}'
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./backend/generated_reports:/app/generated_reports
    restart: unless-stopped
