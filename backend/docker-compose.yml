services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: factory_backend_api
    environment:
      APP_NAME: Factory Owner MVP
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/factory_mvp
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SECRET_KEY: change-me-in-production-docker
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      ALGORITHM: HS256
      CORS_ORIGINS: '["http://127.0.0.1:5173","http://127.0.0.1:5174","http://localhost:5173","http://localhost:5174"]'
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: factory_postgres
    environment:
      POSTGRES_DB: factory_mvp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d factory_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: factory_redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
